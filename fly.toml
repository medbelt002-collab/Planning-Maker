# fly.toml app configuration file generated for planning-maker on 2026-07-12T20:45:33+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'planning-maker'
primary_region = 'cdg'

[build]
[env]
  PORT = '8080'

[[mounts]]
  source = 'planning_data'
  destination = '/app/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
